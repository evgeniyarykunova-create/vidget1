<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
margin:0;
overflow:hidden;
}

/* контейнер лупы */

#magnifier{
position:fixed;
width:220px;
height:220px;
pointer-events:none;
display:none;
z-index:99999;
}

/* стеклянная линза */

#magnifierLens{
width:220px;
height:220px;
border-radius:50%;
overflow:hidden;
position:absolute;

border:5px solid #2c2c2c;

background:
radial-gradient(circle at 30% 30%, rgba(255,255,255,0.45), rgba(255,255,255,0.05) 40%, rgba(0,0,0,0.15));

box-shadow:
0 12px 30px rgba(0,0,0,0.35),
inset 0 0 20px rgba(0,0,0,0.25),
inset 0 0 40px rgba(255,255,255,0.15);
}

/* содержимое увеличения */

#magnifierContent{
position:absolute;
transform-origin:top left;
}

/* ручка лупы */

#magnifierHandle{

position:absolute;
width:120px;
height:22px;

background:linear-gradient(90deg,#444,#222);

border-radius:12px;

bottom:-55px;
left:150px;

transform:rotate(45deg);

box-shadow:
inset 0 0 8px rgba(255,255,255,0.2),
0 6px 10px rgba(0,0,0,0.4);

}

</style>
</head>

<body>

<div id="magnifier">

<div id="magnifierLens">
<div id="magnifierContent"></div>
</div>

<div id="magnifierHandle"></div>

</div>

<script>

let zoom = 2.5
const SIZE = 220
const TARGET = ".zoomable"

const magnifier = document.getElementById("magnifier")
const content = document.getElementById("magnifierContent")

document.addEventListener("mousemove", e => {

const el = document.elementFromPoint(e.clientX,e.clientY)

if(!el || !el.closest(TARGET)){

magnifier.style.display="none"
return

}

const target = el.closest(TARGET)

magnifier.style.display="block"

magnifier.style.left = (e.clientX - SIZE/2) + "px"
magnifier.style.top = (e.clientY - SIZE/2) + "px"

const rect = target.getBoundingClientRect()

const clone = target.cloneNode(true)

content.innerHTML=""
content.appendChild(clone)

content.style.transform = `scale(${zoom})`

const offsetX = e.clientX - rect.left
const offsetY = e.clientY - rect.top

content.style.left = -(offsetX * zoom - SIZE/2) + "px"
content.style.top = -(offsetY * zoom - SIZE/2) + "px"

})

/* zoom колесом мыши */

document.addEventListener("wheel", e => {

zoom += e.deltaY * -0.001

if(zoom < 1) zoom = 1
if(zoom > 6) zoom = 6

})

</script>

</body>
</html>
