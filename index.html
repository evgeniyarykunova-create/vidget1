<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Emoji Sentence Challenge</title>
<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#f4f6fb;
    padding:20px;
}

h2{
    margin-bottom:10px;
}

#emojiBox{
    font-size:50px;
    margin:25px 0;
    min-height:70px;
}

button{
    padding:10px 18px;
    font-size:16px;
    border:none;
    border-radius:8px;
    background:#4a6cff;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#324ed6;
}

#sentence{
    margin-top:20px;
    width:80%;
    max-width:400px;
    padding:10px;
    font-size:16px;
    border-radius:6px;
    border:1px solid #ccc;
}
</style>
</head>

<body>

<h2>Emoji Sentence Challenge</h2>
<p>Посмотри на эмодзи и составь предложение.</p>

<div id="emojiBox"></div>

<button onclick="generateEmojis()">Новые эмодзи</button>

<br>

<input id="sentence" placeholder="Напиши предложение..." />

<script>

const emojiList = [
"😀","😂","😍","🤔","😴","😎","🥳",
"🍎","🍕","🍔","🍦","🍩",
"🐶","🐱","🐸","🐵",
"⚽","🏀","🎸","🎮",
"🚗","✈️","🚲",
"🌞","🌧️","❄️",
"🏫","📚","💡",
"❤️","⭐","🔥"
];

function generateEmojis(){

let count = Math.floor(Math.random()*4)+3; // 3–6
let result = [];

for(let i=0;i<count;i++){
let randomEmoji = emojiList[Math.floor(Math.random()*emojiList.length)];
result.push(randomEmoji);
}

document.getElementById("emojiBox").textContent = result.join(" ");

}

generateEmojis();

</script>

</body>
</html>
